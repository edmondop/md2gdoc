name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          additional_files: md2gdoc

      - name: Ruff (Python)
        uses: astral-sh/ruff-action@v3
        with:
          args: check build-reference.py

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        uses: pandoc/actions/setup@v1
        with:
          version: 3.6.4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build reference DOCX
        run: uv run build-reference.py

      - name: Run smoke tests
        run: |
          chmod +x md2gdoc tests/test_conversion.sh
          bash tests/test_conversion.sh
